<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出貨查詢 App</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 15px; }
        .container { max-width: 480px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #07c160; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .item-header { border-left: 5px solid #07c160; padding-left: 10px; margin-top: 20px; }
        .group-box { margin-top: 15px; padding: 15px; border-radius: 10px; border: 1px solid #eee; background: #fff; }
        .color-0 { border-left: 6px solid #007aff; background: #f0f7ff; }
        .color-1 { border-left: 6px solid #28a745; background: #f0fff4; }
        .color-2 { border-left: 6px solid #ffc107; background: #fffcf0; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
        .grand-total { margin-top: 20px; padding: 15px; background: #2c3e50; color: white; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center">📋 出貨快速查詢</h2>
    <input type="text" id="searchName" placeholder="輸入品項名稱 (如: 洋芋片)">
    <button onclick="fetchData()">搜尋雲端資料</button>

    <div id="resultArea" style="display:none;">
        <div class="item-header"><h3 id="displayTitle" style="margin:0;"></h3></div>
        <div id="groupsContainer"></div>
        <div class="grand-total">
            <div style="font-size: 14px;">總出貨數量</div>
            <div id="grandSum" style="font-size: 24px; font-weight: bold;"></div>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = '2PACX-1vSKJ-bbty6XrC42lhDt4IZkx30Xd5suv7asS7ujAncXMnv_AnHBRNuXbxU_HeH3sNxduS22z8I_rqF0'; 
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&gid=0`; // 強制指定第一張工作表

    async function fetchData() {
        const target = document.getElementById('searchName').value.trim();
        if(!target) return;

        try {
            const resp = await fetch(SHEET_URL);
            const csvText = await resp.text();
            
            // 解析 CSV 行
            const rows = csvText.split('\r\n').map(row => {
                // 處理可能包含逗號的引號內容
                return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            });
            
            // 尋找品項：根據你的截圖，品項在第 1 欄 (索引 0)
            const match = rows.find(r => r[0] && r[0].replace(/"/g, '').includes(target));

            if (match) {
                // 傳遞參數：品項(0), 店家數量(1), 分組規則(3)
                render(match[0], match[1], match[3] || "");
            } else {
                alert("找不到包含「" + target + "」的品項，請檢查試算表第一欄。");
            }
        } catch (e) {
            console.error(e);
            alert("讀取失敗！請確保試算表『發佈到網路』。");
        }
    }

    function render(name, details, ruleStr) {
        document.getElementById('displayTitle').innerText = name.replace(/"/g, '');
        const container = document.getElementById('groupsContainer');
        container.innerHTML = "";

        // 解析店家：移除引號並根據逗號分割
        const cleanDetails = details.replace(/"/g, '');
        const allShops = cleanDetails.split(',').map(s => {
            const parts = s.trim().split(/\s+/);
            return { name: parts[0], qty: parseInt(parts[1]) || 0, used: false };
        }).filter(s => s.name);

        const groups = ruleStr ? ruleStr.replace(/"/g, '').split('/').map(g => g.trim()) : [];
        let totalSum = 0;

        groups.forEach((groupRule, index) => {
            const targets = groupRule.split('+').map(t => t.trim());
            let gHtml = "";
            let gSum = 0;
            allShops.forEach(shop => {
                if (targets.some(t => shop.name.includes(t))) {
                    gHtml += `<div class="row"><span>${shop.name}</span><span>${shop.qty}</span></div>`;
                    gSum += shop.qty;
                    shop.used = true;
                }
            });
            if (gHtml) {
                const box = document.createElement('div');
                box.className = `group-box color-${index % 3}`;
                box.innerHTML = `<strong>📍 組別：${groupRule}</strong>${gHtml}<div style="text-align:right; font-weight:bold; color:#666; font-size:14px; margin-top:5px;">小計: ${gSum}</div>`;
                container.appendChild(box);
                totalSum += gSum;
            }
        });

        let rHtml = "";
        let rSum = 0;
        allShops.forEach(shop => {
            if (!shop.used) {
                rHtml += `<div class="row"><span>${shop.name}</span><span>${shop.qty}</span></div>`;
                rSum += shop.qty;
            }
        });
        if (rHtml) {
            const box = document.createElement('div');
            box.className = "group-box";
            box.innerHTML = `<strong>📍 ${groups.length > 0 ? '其他' : '店家清單'}</strong>${rHtml}<div style="text-align:right; font-weight:bold; color:#666; font-size:14px; margin-top:5px;">小計: ${rSum}</div>`;
            container.appendChild(box);
            totalSum += rSum;
        }

        document.getElementById('grandSum').innerText = totalSum;
        document.getElementById('resultArea').style.display = 'block';
    }
</script>

</body>
</html>
